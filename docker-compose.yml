version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: govscheme_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-welfare_assistant}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./dataset/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: govscheme_backend
    restart: always
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-welfare_assistant}
      JWT_SECRET: ${JWT_SECRET:-super_secret_dev_key}
      AI_SERVICE_URL: http://ai_module:5001
    ports:
      - "5000:5000"
    depends_on:
      - db
      - ai_module

  ai_module:
    build:
      context: ./ai_module
    container_name: govscheme_ai
    restart: always
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-welfare_assistant}
    ports:
      - "5001:5001"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: govscheme_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
